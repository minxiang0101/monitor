<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>工程项目</title>
  <% for (var i in htmlWebpackPlugin.options.cdn && htmlWebpackPlugin.options.cdn.css) { %>
    <link href="<%= htmlWebpackPlugin.options.cdn.css[i] %>" rel="stylesheet">
    <% } %>
    <style>
      .el-select-dropdown{
        border: 1px solid rgba(108, 192, 255, 0.5) !important;
        background: rgba(5, 34, 68, 1) !important;
        box-shadow: 0px 0px 20px 0px rgba(0, 178, 255, 0.5) !important;
        color:#fff;
      }
      .el-select-dropdown__item{
        color: #fff !important;
      }
      .el-select-dropdown__item.selected{
        color: #409EFF !important;
      }
      .el-select-dropdown__item.hover, .el-select-dropdown__item:hover {
        background-color: rgba(0, 153, 255, 0.2) !important;
      }
      .el-popper[x-placement^=bottom] .popper__arrow::after {
        border-bottom-color: rgba(5, 34, 68, 1) !important;
      }
      .el-popper[x-placement^=top] .popper__arrow::after{
        border-top-color:rgba(5, 34, 68, 1) !important;
      }
    </style>
</head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
  </noscript>
  <div id="app"></div>
  <% for (var i in htmlWebpackPlugin.options.cdn && htmlWebpackPlugin.options.cdn.js) { %>
    <script src="<%= htmlWebpackPlugin.options.cdn.js[i] %>"></script>
    <% } %>
      <!-- built files will be auto injected -->
</body>

</html>
